# BIT — Docker Compose for local paper trading
#
# Services:
#   bot        — BotRunner (pipeline loop, writes to data/)
#   dashboard  — FastAPI dashboard (reads data/, serves http://localhost:8765)
#
# Quick start:
#   cp .env.example .env     # fill in BYBIT_API_KEY, BYBIT_API_SECRET (optional for paper)
#   docker compose up
#
# Open dashboard: http://localhost:8765
#
# Stop cleanly:
#   docker compose down
#
# View logs:
#   docker compose logs -f bot
#   docker compose logs -f dashboard

services:
  bot:
    build: .
    command: python -m bit
    env_file: .env
    volumes:
      - bit_data:/app/data
    restart: unless-stopped
    healthcheck:
      # Healthy: runner_state.json exists, status=running, written recently.
      # Uses only the Python stdlib — no curl required.
      test: ["CMD", "python", "-m", "bit.healthcheck"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 45s

  dashboard:
    build: .
    command: uvicorn bit.dashboard.app:app --host 0.0.0.0 --port 8765
    env_file: .env
    ports:
      - "127.0.0.1:8765:8765"
    volumes:
      - bit_data:/app/data
    depends_on:
      - bot
    restart: unless-stopped
    healthcheck:
      # Healthy: /health returns HTTP 200.
      test:
        - CMD
        - python
        - -c
        - |
          import urllib.request, sys
          try:
            urllib.request.urlopen('http://localhost:8765/health', timeout=5)
            sys.exit(0)
          except Exception:
            sys.exit(1)
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  # Named volume so data persists across `docker compose down / up`.
  # To reset state completely: docker volume rm bit_bit_data
  bit_data:
